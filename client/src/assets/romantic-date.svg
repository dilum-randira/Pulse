<svg width="800" height="1200" viewBox="0 0 800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="moon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 210) rotate(90) scale(90)">
      <stop stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </radialGradient>
    <linearGradient id="tablecloth" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="primaryDress" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#be123c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>

  <!-- stars -->
  <g fill="#e5e7eb" fill-opacity="0.9">
    <circle cx="120" cy="120" r="2"/>
    <circle cx="220" cy="80" r="1.8"/>
    <circle cx="320" cy="150" r="1.5"/>
    <circle cx="520" cy="90" r="2.1"/>
    <circle cx="640" cy="140" r="1.7"/>
    <circle cx="700" cy="60" r="1.4"/>
    <circle cx="80" cy="210" r="1.6"/>
    <circle cx="260" cy="230" r="1.2"/>
    <circle cx="560" cy="220" r="1.3"/>
  </g>

  <!-- moon -->
  <circle cx="400" cy="210" r="80" fill="url(#moon)"/>
  <circle cx="430" cy="200" r="10" fill="#d4d4d8"/>
  <circle cx="370" cy="230" r="14" fill="#d4d4d8"/>
  <circle cx="390" cy="190" r="7" fill="#d4d4d8"/>

  <!-- string lights -->
  <path d="M40 110 C 200 40 600 40 760 110" stroke="#fecaca" stroke-width="4" stroke-linecap="round"/>
  <g fill="#fed7aa">
    <circle cx="130" cy="95" r="10"/>
    <circle cx="260" cy="75" r="10"/>
    <circle cx="400" cy="65" r="10"/>
    <circle cx="540" cy="75" r="10"/>
    <circle cx="670" cy="95" r="10"/>
  </g>

  <!-- distant buildings -->
  <g fill="#020617" fill-opacity="0.7">
    <rect x="0" y="320" width="180" height="120" rx="8"/>
    <rect x="160" y="300" width="160" height="140" rx="8"/>
    <rect x="340" y="310" width="140" height="130" rx="8"/>
    <rect x="500" y="295" width="180" height="145" rx="8"/>
  </g>

  <!-- terrace floor -->
  <rect x="0" y="640" width="800" height="560" fill="#111827"/>
  <rect x="0" y="640" width="800" height="6" fill="#1f2937"/>

  <!-- table and cloth -->
  <rect x="200" y="520" width="400" height="260" rx="32" fill="url(#tablecloth)"/>
  <rect x="200" y="730" width="400" height="20" fill="#fecaca"/>

  <!-- table base -->
  <rect x="380" y="750" width="40" height="160" rx="12" fill="#7f1d1d"/>
  <rect x="340" y="900" width="120" height="26" rx="12" fill="#7f1d1d"/>

  <!-- candles on table -->
  <g>
    <rect x="310" y="520" width="10" height="60" rx="4" fill="#fde68a"/>
    <circle cx="315" cy="510" r="10" fill="#fef9c3"/>
    <rect x="385" y="520" width="10" height="60" rx="4" fill="#fde68a"/>
    <circle cx="390" cy="510" r="10" fill="#fef9c3"/>
    <rect x="465" y="520" width="10" height="60" rx="4" fill="#fde68a"/>
    <circle cx="470" cy="510" r="10" fill="#fef9c3"/>
  </g>

  <!-- vase and rose -->
  <g>
    <rect x="386" y="570" width="28" height="40" rx="14" fill="#e5e7eb"/>
    <path d="M400 570 C 395 550 392 540 386 530" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="380" cy="525" r="10" fill="#be123c"/>
  </g>

  <!-- man on left -->
  <g>
    <!-- legs -->
    <rect x="210" y="740" width="40" height="170" rx="18" fill="#0f172a"/>
    <rect x="250" y="740" width="40" height="170" rx="18" fill="#020617"/>
    <!-- shoes -->
    <rect x="200" y="900" width="70" height="26" rx="12" fill="#020617"/>
    <rect x="250" y="900" width="80" height="26" rx="12" fill="#020617"/>
    <!-- torso -->
    <rect x="210" y="610" width="120" height="140" rx="40" fill="#1f2937"/>
    <rect x="230" y="620" width="80" height="120" rx="40" fill="#0f172a"/>
    <!-- arm -->
    <rect x="280" y="610" width="120" height="34" rx="17" fill="#1f2937"/>
    <rect x="350" y="585" width="80" height="28" rx="14" fill="#fbbf24"/>
    <!-- hand -->
    <circle cx="430" cy="599" r="16" fill="#fed7aa"/>
    <!-- head -->
    <circle cx="250" cy="575" r="40" fill="#fed7aa"/>
    <path d="M220 565 C 225 540 245 530 270 535" stroke="#7c2d12" stroke-width="22" stroke-linecap="round"/>
    <!-- glass -->
    <rect x="330" y="500" width="14" height="70" rx="6" fill="#e5e7eb"/>
    <path d="M337 495 C 350 495 360 505 360 518 C 360 530 350 540 337 540 C 324 540 314 530 314 518 C 314 505 324 495 337 495Z" fill="#fef9c3"/>
  </g>

  <!-- woman on right -->
  <g>
    <!-- legs -->
    <rect x="520" y="740" width="40" height="170" rx="18" fill="#4b1d35"/>
    <rect x="560" y="740" width="40" height="170" rx="18" fill="#451a2d"/>
    <!-- shoes -->
    <rect x="510" y="900" width="80" height="26" rx="12" fill="#1f2937"/>
    <rect x="565" y="900" width="80" height="26" rx="12" fill="#1f2937"/>
    <!-- dress -->
    <rect x="510" y="600" width="130" height="150" rx="60" fill="url(#primaryDress)"/>
    <!-- arm reaching out -->
    <rect x="470" y="605" width="140" height="26" rx="13" fill="#fecaca"/>
    <circle cx="470" cy="618" r="16" fill="#fecaca"/>
    <!-- head -->
    <circle cx="570" cy="560" r="38" fill="#fecaca"/>
    <!-- hair -->
    <path d="M540 555 C 540 525 565 510 595 515 C 615 520 630 540 630 565 C 630 590 615 610 595 615" stroke="#b91c1c" stroke-width="32" stroke-linecap="round"/>
    <!-- necklace -->
    <circle cx="570" cy="590" r="6" fill="#facc15"/>
  </g>

  <!-- floor candles -->
  <g>
    <rect x="200" y="920" width="10" height="40" rx="4" fill="#fde68a"/>
    <circle cx="205" cy="914" r="8" fill="#fef3c7"/>
    <rect x="590" y="920" width="10" height="40" rx="4" fill="#fde68a"/>
    <circle cx="595" cy="914" r="8" fill="#fef3c7"/>
  </g>
</svg>
